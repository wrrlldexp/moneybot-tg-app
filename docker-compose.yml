services:
  postgres:
    image: postgres:16-alpine
    container_name: tgbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tgbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tgbot_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tgbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgbot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  redis:
    image: redis:7-alpine
    container_name: tgbot_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.25

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tgbot_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tgbot}:${POSTGRES_PASSWORD:-tgbot_dev_pass}@postgres:5432/${POSTGRES_DB:-tgbot}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost:5174}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5174}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - ./backend:/app
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 512m
    cpus: 1.0

  tg-bot:
    build:
      context: ./tg-bot
      dockerfile: Dockerfile
    container_name: tgbot_telegram
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost:5174}
      BACKEND_URL: http://backend:8000
      REDIS_URL: redis://redis:6379/0
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
    volumes:
      - ./tg-bot:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import bot.config'"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    cpus: 0.5

  tg-mini-app:
    build:
      context: ./tg-mini-app
      dockerfile: Dockerfile
    container_name: tgbot_mini_app
    restart: unless-stopped
    volumes:
      - ./tg-mini-app:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:5174/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: 0.5

  nginx:
    image: nginx:alpine
    container_name: tgbot_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      tg-mini-app:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 128m
    cpus: 0.25

volumes:
  postgres_data:
  redis_data:
