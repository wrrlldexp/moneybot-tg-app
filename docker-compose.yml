services:
  postgres:
    image: postgres:16-alpine
    container_name: tgbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tgbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tgbot_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tgbot}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tgbot_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tgbot_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tgbot}:${POSTGRES_PASSWORD:-tgbot_dev_pass}@postgres:5432/${POSTGRES_DB:-tgbot}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost:5174}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5174}
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    volumes:
      - ./backend:/app
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  tg-bot:
    build:
      context: ./tg-bot
      dockerfile: Dockerfile
    container_name: tgbot_telegram
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost:5174}
      BACKEND_URL: http://backend:8000
      REDIS_URL: redis://redis:6379/0
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
    volumes:
      - ./tg-bot:/app

  tg-mini-app:
    build:
      context: ./tg-mini-app
      dockerfile: Dockerfile
    container_name: tgbot_mini_app
    restart: unless-stopped
    ports:
      - "${TG_MINI_APP_PORT:-5174}:5174"
    volumes:
      - ./tg-mini-app:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-}

volumes:
  postgres_data:
  redis_data:
