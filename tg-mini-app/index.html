<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MoneyBot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Debug: show errors on screen
      window.onerror = function(msg, url, line) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:16px;background:red;color:white;font-size:12px;z-index:99999;word-break:break-all';
        d.textContent = msg + ' (' + url + ':' + line + ')';
        document.body.appendChild(d);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
